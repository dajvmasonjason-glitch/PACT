name: pact_isoc_rsvd

# 固定比例方法参数（随机SVD固定划分，无能量阈值）
K_ratio: 0.8           # 预训练核心空间占总维度的比例
k_per_task: 10         # 每个任务分配的维度数

# Newton-Schulz 迭代参数（用于替代完整SVD的ISOC融合）
ns_iterations: 5       # Newton-Schulz 迭代次数
ns_eps: 1e-8           # 避免除零的小量

full_name: ${method.name}_Kratio=${method.K_ratio}_kpt=${method.k_per_task}_nsiter=${method.ns_iterations}
